version: '3.8'

services:
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_LOG_LEVEL=debug
    volumes:
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
      - grafana_data:/var/lib/grafana
      - ./logs/grafana:/var/log/grafana
    networks:
      - k6-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  influxdb:
    image: influxdb:1.8
    container_name: influxdb
    ports:
      - "8086:8086"
    environment:
      - INFLUXDB_DB=k6
      - INFLUXDB_HTTP_ENABLED=true
      - INFLUXDB_HTTP_AUTH_ENABLED=false
      - INFLUXDB_READ_ONLY=false
      - INFLUXDB_LOG_LEVEL=debug
    volumes:
      - influxdb_data:/var/lib/influxdb
      - ./logs/influxdb:/var/log/influxdb
    networks:
      - k6-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # k6 service for manual execution with debugging
  k6s:
    image: grafana/k6:latest
    container_name: k6s
    volumes:
      - ./scripts:/scripts
      - ./results:/results
      - ./k6:/home/k6
      - ./logs/k6:/logs
    environment:
      - K6_OUT=influxdb=http://influxdb:8086/k6
      - K6_LOG_LEVEL=debug
    networks:
      - k6-network
    depends_on:
      influxdb:
        condition: service_healthy
      grafana:
        condition: service_healthy
    # Keep container alive for manual execution
    entrypoint: ["/bin/sh", "-c"]
    command: ["while true; do sleep 3600; done"]    
    restart: unless-stopped

volumes:
  grafana_data:
  influxdb_data:

networks:
  k6-network:
    driver: bridge